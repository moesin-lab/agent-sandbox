# Transparent intercept ports.
# 3128 carries plaintext HTTP redirected from clients' :80.
# 3129 carries TLS redirected from clients' :443; we only peek the SNI and
# splice (passthrough) — no MITM, no client-side CA needed.
# Squid also needs one non-intercept listener so its own internal URLs and
# manager endpoints have a valid forward-proxy port to reference.
http_port 127.0.0.1:3130
http_port 3128 intercept
https_port 3129 intercept ssl-bump \
    tls-cert=/etc/squid/ssl/bump.pem \
    tls-key=/etc/squid/ssl/bump.pem

sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/cache/squid/ssl_db -M 4MB
sslcrtd_children 5

# Default-allow policy: anything not explicitly listed in the blocklist passes
# through. Use the blocklist to force traffic onto a controlled path (e.g.
# block direct api.github.com so agents must go through mcp-gateway).
acl blocked_http dstdomain "/etc/squid/blocklist.txt"
acl blocked_sni  ssl::server_name "/etc/squid/blocklist.txt"

acl step1 at_step SslBump1

# Peek ClientHello -> learn SNI -> terminate blocked targets, splice the rest.
ssl_bump peek step1
ssl_bump terminate blocked_sni
ssl_bump splice all

# Plain HTTP enforcement uses Host header (visible after intercept).
http_access deny blocked_http
http_access allow all

cache deny all
access_log stdio:/var/log/squid/access.log
cache_log  stdio:/var/log/squid/cache.log

# Squid still needs to listen on a manager port for its own healthchecks.
http_access allow localhost manager
http_access deny manager
