name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (sh)
        run: |
          for f in \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          do
            sh -n "$f"
          done

      - name: Shell syntax (bash)
        run: |
          for f in \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            bin/agent-sandbox \
            bin/sandbox
          do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=error -s sh \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          shellcheck --severity=error \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            bin/agent-sandbox \
            bin/sandbox

      - name: docker compose config
        run: |
          docker compose -f compose.yaml config -q
          docker compose -f compose.simple.yaml config -q

  e2e:
    name: end-to-end (verify.sh)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Align runtime/ ownership and perms for both runner and container
        # Host bind mounts inherit the runner user (uid 1001); the sandbox
        # container runs as uid 1000 with read_only root, so its entrypoint
        # cannot mkdir into /state, /logs, /tool-bin without this chown.
        # Chmod a+rwX afterwards so the host-side runner (still uid 1001) can
        # also write runtime/state/compose-mode, which bin/agent-sandbox does
        # from the host during `up`.
        run: |
          sudo chown -R 1000:1000 runtime/
          sudo chmod -R a+rwX runtime/

      - name: Run scripts/verify.sh
        # github-mcp-server 启动期硬校验 GITHUB_PERSONAL_ACCESS_TOKEN 非空，
        # 否则进程直接退出、连带 mcp-proxy 无法完成 MCP initialize 握手。
        # CI 不打 GitHub API，给一个占位字符串就够 mcp-gateway 起来通过 /status。
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ci_placeholder_not_used_for_api
        run: scripts/verify.sh

      # verify.sh 自己在 trap cleanup 里负责 down 前 dump 诊断，这里不再重复。
