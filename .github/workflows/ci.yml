name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (sh)
        run: |
          for f in \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          do
            sh -n "$f"
          done

      - name: Shell syntax (bash)
        run: |
          for f in \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            scripts/migrate-home-to-state.sh \
            bin/agent-sandbox \
            bin/sandbox
          do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=error -s sh \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          shellcheck --severity=error \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            scripts/migrate-home-to-state.sh \
            bin/agent-sandbox \
            bin/sandbox

      - name: docker compose config
        run: |
          docker compose -f compose.yaml config -q
          docker compose -f compose.simple.yaml config -q

  e2e:
    name: end-to-end (verify.sh)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Align runtime/ ownership and perms for both runner and container
        # Host bind mounts inherit the runner user (uid 1001); the sandbox
        # container runs as uid 1000 with read_only root, so its entrypoint
        # cannot mkdir into /state, /logs, /tool-bin without this chown.
        # Chmod a+rwX afterwards so the host-side runner (still uid 1001) can
        # also write runtime/state/compose-mode, which bin/agent-sandbox does
        # from the host during `up`.
        run: |
          sudo chown -R 1000:1000 runtime/
          sudo chmod -R a+rwX runtime/

      - name: Run scripts/verify.sh
        run: scripts/verify.sh

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          set +e
          echo '--- docker compose ps -a ---'
          docker compose -f compose.yaml ps -a
          echo '--- docker compose logs (tail) ---'
          docker compose -f compose.yaml logs --tail=300
          echo '--- docker network ls ---'
          docker network ls
          echo '--- proxy iptables nat ---'
          docker compose -f compose.yaml exec -T proxy iptables -t nat -L -n -v
          echo '--- sandbox /etc/resolv.conf ---'
          docker compose -f compose.yaml exec -T sandbox cat /etc/resolv.conf
          echo '--- sandbox nslookup mcp-gateway ---'
          docker compose -f compose.yaml exec -T sandbox getent hosts mcp-gateway
          docker compose -f compose.yaml exec -T sandbox sh -c 'command -v nslookup && nslookup mcp-gateway || true'
