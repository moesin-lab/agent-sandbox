name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (sh)
        run: |
          for f in \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          do
            sh -n "$f"
          done

      - name: Shell syntax (bash)
        run: |
          for f in \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            scripts/migrate-home-to-state.sh \
            bin/agent-sandbox \
            bin/sandbox
          do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=error -s sh \
            sandbox/files/entrypoint \
            sandbox/files/install-claude \
            sandbox/files/claude
          shellcheck --severity=error \
            proxy/entrypoint.sh \
            scripts/verify.sh \
            scripts/migrate-home-to-state.sh \
            bin/agent-sandbox \
            bin/sandbox

      - name: docker compose config
        run: |
          docker compose -f compose.yaml config -q
          docker compose -f compose.simple.yaml config -q

  e2e:
    name: end-to-end (verify.sh)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run scripts/verify.sh
        run: scripts/verify.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f compose.yaml ps || true
          docker compose -f compose.yaml logs --tail=200 || true
