services:
  sandbox:
    build:
      context: ../../sandbox
    image: ${SANDBOX_IMAGE:-agent-sandbox:dev}
    volumes:
      - ../../runtime/workspaces:/workspace
      - ../../runtime/logs:/runtime/logs
      - ../../runtime/state:/runtime/state
      - ../../runtime/home:/home/node
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      MCP_GITHUB_URL: http://mcp-gateway:${MCP_GATEWAY_PORT:-8080}${MCP_GITHUB_PATH:-/servers/github/mcp}
    depends_on:
      - proxy
      - mcp-gateway
    networks:
      - agent_net

  proxy:
    build:
      context: ../../proxy
    image: ${PROXY_IMAGE:-agent-sandbox-proxy:dev}
    volumes:
      - ../../config/proxy-rules:/rules:ro
    networks:
      - agent_net
      - egress_net

  mcp-gateway:
    build:
      context: ../../mcp-gateway
    image: ${MCP_GATEWAY_IMAGE:-agent-sandbox-mcp-gateway:dev}
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      GITHUB_HOST: ${GITHUB_HOST:-}
      GITHUB_READ_ONLY: ${GITHUB_READ_ONLY:-1}
      GITHUB_TOOLSETS: ${GITHUB_TOOLSETS:-default}
      GITHUB_DYNAMIC_TOOLSETS: ${GITHUB_DYNAMIC_TOOLSETS:-0}
    volumes:
      - ../../config/mcp-gateway/servers.json:/etc/mcp-gateway/servers.json:ro
    networks:
      - agent_net
      - egress_net

networks:
  agent_net:
    internal: true
  egress_net:
