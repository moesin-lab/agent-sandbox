name: agent_sandbox

services:
  proxy:
    build:
      context: ./proxy
    image: ${PROXY_IMAGE:-agent-sandbox-proxy:dev}
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config/proxy-rules:/rules:ro
    # Sandbox shares this container's netns, so any port the agent listens on
    # inside the sandbox must be published here. Default range is host-loopback
    # only; override AGENT_SANDBOX_PUBLISH_PORTS in .env to widen or relocate.
    ports:
      - "${AGENT_SANDBOX_PUBLISH_PORTS:-127.0.0.1:7000-7010:7000-7010}"
    networks:
      - egress_net
      - agent_net

  sandbox:
    build:
      context: ./sandbox
      args:
        ENABLE_PASSWORDLESS_SUDO: ${ENABLE_PASSWORDLESS_SUDO:-0}
    image: ${SANDBOX_IMAGE:-agent-sandbox:dev}
    command: ["sleep", "infinity"]
    init: true
    security_opt:
      - no-new-privileges:${AGENT_SANDBOX_NO_NEW_PRIVILEGES:-true}
    read_only: ${AGENT_SANDBOX_READ_ONLY_ROOT:-true}
    cap_drop:
      - ALL
    pids_limit: ${SANDBOX_PIDS_LIMIT:-512}
    mem_limit: ${SANDBOX_MEMORY_LIMIT:-8g}
    cpus: ${SANDBOX_CPUS:-4}
    # Share the proxy container's network namespace so its iptables rules
    # transparently intercept this container's outbound 80/443 traffic.
    network_mode: "service:proxy"
    volumes:
      - ${AGENT_SANDBOX_WORKSPACE_DIR:-./runtime/workspaces}:${AGENT_SANDBOX_WORKSPACE_TARGET:-/workspace}:${AGENT_SANDBOX_WORKSPACE_MODE:-rw}
      - ${AGENT_SANDBOX_STATE_DIR:-./runtime/state}:/state
      - ${AGENT_SANDBOX_LOGS_DIR:-./runtime/logs}:/logs
      - ${AGENT_SANDBOX_TOOL_BIN_DIR:-./runtime/tool-bin}:/tool-bin
    tmpfs:
      - /home/node:rw,nosuid,nodev,uid=1000,gid=1000,mode=700,size=${AGENT_SANDBOX_HOME_TMPFS_SIZE:-64m}
      - /cache:rw,nosuid,nodev,uid=1000,gid=1000,mode=700,size=${AGENT_SANDBOX_CACHE_SIZE:-1g}
      - /tmp:rw,nosuid,nodev,noexec,size=${AGENT_SANDBOX_TMP_SIZE:-512m}
      - /run:rw,nosuid,nodev,size=${AGENT_SANDBOX_RUN_SIZE:-64m}
      - /var/tmp:rw,nosuid,nodev,noexec,size=${AGENT_SANDBOX_TMP_SIZE:-512m}
    # List entries without `=` are pulled from the host shell at compose time
    # and left unset in the container if missing on the host. Use this for
    # secrets the agent CLIs need (oauth tokens persist under /state anyway,
    # so these env vars are only the API-key path; either works).
    environment:
      - ANTHROPIC_API_KEY
      - CLAUDE_RELEASE_TAG
      - OPENAI_API_KEY
      - AGENT_SANDBOX_ENTRYPOINT_LINKS
    depends_on:
      - proxy

networks:
  agent_net:
    internal: true
  egress_net:
